name: Build Android APK (Standalone)

on:
  push:
    branches:
      - main
      - test_share
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java Development Kit (JDK 17)
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: |
          cd frontend
          npm ci

      - name: Generate Native Android Project (Expo Prebuild)
        run: |
          cd frontend
          npx expo prebuild --platform android --clean

      - name: Generate debug keystore for Release Build (if missing)
        run: |
          cd frontend/android/app
          if [ ! -f debug.keystore ]; then
            keytool -genkey -v -keystore debug.keystore -storepass android -alias androiddebugkey -keypass android -keyalg RSA -keysize 2048 -validity 10000 -dname "CN=Android Debug,O=Android,C=US"
          fi

      - name: Build Debug APK with Gradle
        run: |
          cd frontend/android
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

      - name: List APK output directory
        run: ls -la frontend/android/app/build/outputs/apk/debug/ || true

      - name: Upload Debug APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: frontend/android/app/build/outputs/apk/debug/*.apk
          if-no-files-found: error

