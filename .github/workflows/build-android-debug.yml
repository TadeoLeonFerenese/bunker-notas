name: Build Android APK (Standalone)

on:
  push:
    branches:
      - main
      - test_share
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java Development Kit (JDK 17)
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: |
          cd frontend
          npm ci

      - name: Generate Native Android Project (Expo Prebuild)
        run: |
          cd frontend
          npx expo prebuild --platform android --clean

      - name: Build Release APK with Gradle
        run: |
          cd frontend/android
          chmod +x gradlew
          ./gradlew assembleRelease --no-daemon

      - name: Upload Release APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: BunkerNotes-Release-APK
          path: frontend/android/app/build/outputs/apk/release/app-release.apk
          if-no-files-found: error
